<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:sans-serif;
    touch-action:none;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
}

/* 🔥 IMPORTANTE: MÁS ARRIBA QUE EL CANVAS */
#mensaje{
    position:absolute;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%);
    text-align:center;
    font-size: clamp(22px, 6vw, 42px);
    color:white;
    opacity:0;
    transition: all 1s ease;
    text-shadow:0 0 30px red;
    z-index:20; /* 🔥 CLAVE */
}

#mensaje.visible{
    opacity:1;
    transform: translate(-50%, -50%) scale(1.05);
}

#ui{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
    z-index:30;
}

input{
    padding:12px;
    font-size:18px;
    border-radius:8px;
    border:none;
}

button{
    margin-top:10px;
    padding:12px 25px;
    background:red;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>
<body>

<div id="ui">
    <h2>Escribe tu nombre ❤️</h2>
    <input id="nombre">
    <br>
    <button id="btnEntrar">Entrar</button>
</div>

<div id="mensaje"></div>

<canvas id="c"></canvas>

<audio id="music" playsinline preload="auto">
    <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let mouse={x:0,y:0};

addEventListener("mousemove",e=>{
    mouse.x=e.clientX;
    mouse.y=e.clientY;
});

addEventListener("touchmove",e=>{
    mouse.x=e.touches[0].clientX;
    mouse.y=e.touches[0].clientY;
},{passive:true});

addEventListener("click", createExplosion);
addEventListener("touchstart", createExplosion);

let started=false,nombre="";
let mensajeEl=document.getElementById("mensaje");

// AUDIO
let analyser,dataArray,audioLevel=0,bass=0;

document.getElementById("btnEntrar").addEventListener("click", start);

function start(){

    nombre = document.getElementById("nombre").value.trim() || "Tú";

    document.getElementById("ui").style.display="none";

    // 🔥 MOSTRAR MENSAJE AQUÍ (UNA SOLA VEZ)
    mensajeEl.innerText="Te quiero mucho " + nombre + " ❤️";
    mensajeEl.classList.add("visible");

    let music=document.getElementById("music");

    let ctxAudio=new (window.AudioContext||window.webkitAudioContext)();

    ctxAudio.resume().then(()=>{
        try{
            let src=ctxAudio.createMediaElementSource(music);
            analyser=ctxAudio.createAnalyser();

            src.connect(analyser);
            analyser.connect(ctxAudio.destination);

            analyser.fftSize=256;
            dataArray=new Uint8Array(analyser.frequencyBinCount);

        }catch(e){}

        music.volume=0.8;
        music.play().catch(()=>{});
    });

    createPlasma();
    started=true;
}

// ❤️ corazón
function heart(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
    };
}

let stars=[],plasma=[],particles=[];

for(let i=0;i<150;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        z:Math.random()*2
    });
}

function createPlasma(){
    plasma=[];
    let scale=Math.min(canvas.width,canvas.height)/35;

    for(let i=0;i<120;i++){
        let a=Math.random()*Math.PI*2;
        let pos=heart(a);

        let x=canvas.width/2+pos.x*scale;
        let y=canvas.height/2+pos.y*scale;

        plasma.push({x,y,angle:Math.random()*6.28});
    }
}

function createExplosion(){
    for(let i=0;i<30;i++){
        particles.push({
            x:mouse.x,
            y:mouse.y,
            vx:(Math.random()-0.5)*8,
            vy:(Math.random()-0.5)*8,
            life:60
        });
    }
}

let t=0;

function draw(){

    if(!started){
        requestAnimationFrame(draw);
        return;
    }

    ctx.fillStyle="rgba(0,0,20,0.3)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    t+=0.02;

    if(analyser){
        analyser.getByteFrequencyData(dataArray);
        let sum=0,low=0;

        for(let i=0;i<dataArray.length;i++){
            sum+=dataArray[i];
            if(i<20) low+=dataArray[i];
        }

        audioLevel=sum/dataArray.length/255;
        bass=low/20/255;
    }

    // estrellas
    stars.forEach(s=>{
        s.y+=0.5+audioLevel*3;
        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }

        ctx.beginPath();
        ctx.arc(s.x,s.y,s.z+audioLevel*2,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    });

    let beat=1+bass*1.2;
    let scale=Math.min(canvas.width,canvas.height)/35;

    // ❤️ corazón contorno
    ctx.beginPath();
    for(let i=0;i<200;i++){
        let a=i/200*Math.PI*2;
        let p=heart(a);

        let x=canvas.width/2+p.x*scale*beat;
        let y=canvas.height/2+p.y*scale*beat;

        i?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    ctx.closePath();

    ctx.strokeStyle="red";
    ctx.lineWidth=3;
    ctx.shadowBlur=20+bass*40;
    ctx.shadowColor="red";
    ctx.stroke();

    ctx.fillStyle="rgba(255,0,0,0.1)";
    ctx.fill();

    // plasma
    ctx.save();
    ctx.clip();

    plasma.forEach(p=>{
        p.angle+=0.03;

        ctx.beginPath();
        ctx.arc(
            canvas.width/2+(p.x-canvas.width/2)*beat,
            canvas.height/2+(p.y-canvas.height/2)*beat,
            2.5+audioLevel*2,0,Math.PI*2
        );

        ctx.fillStyle="rgb(255,70,70)";
        ctx.fill();
    });

    ctx.restore();

    // partículas
    particles.forEach((p,i)=>{
        p.x+=p.vx;
        p.y+=p.vy;
        p.life--;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();

        if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
